<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>منصة الشكاوى الذكية - الفصول والمعامل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.2rem;
            color: #1e3c72;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header p {
            color: #2c3e66;
            font-size: 1.05rem;
            border-bottom: 2px solid #3498db;
            display: inline-block;
            padding-bottom: 0.3rem;
        }

        .two-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .form-section, .lab-card {
            flex: 1;
            min-width: 280px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            padding: 1.8rem;
            transition: transform 0.2s ease;
        }

        .complaints-section {
            flex: 1.2;
            min-width: 300px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
        }

        .form-title, .list-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #1e3c72;
            border-right: 5px solid #3498db;
            padding-right: 15px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }

        select, input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccd7e6;
            border-radius: 18px;
            font-size: 1rem;
            background-color: #fefefe;
            outline: none;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        button:hover { background: #2c7ab3; }

        /* صفحة التفاصيل */
        #detailsPage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f0f4f8;
            z-index: 2000;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .labs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .complaints-list {
            flex: 1;
            max-height: 500px;
            overflow-y: auto;
        }

        .complaint-card {
            background: #f9fafc;
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-right: 5px solid #3498db;
            position: relative;
        }

        .auto-tag {
            background: #e74c3c;
            color: white;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 10px;
            position: absolute;
            top: 10px; left: 10px;
        }

        .delete-btn {
            background: #fee2e2;
            color: #e74c3c;
            width: auto;
            padding: 5px 12px;
            font-size: 0.8rem;
        }

        .toast-message {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e50;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            opacity: 0;
            transition: 0.3s;
            z-index: 3000;
        }

        @media (max-width: 768px) {
            .two-columns { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📢 منصة الشكاوى الذكية</h1>
        <p>نظام المراقبة التلقائي للكهرباء مفعل ✅</p>
        <div style="margin-top: 20px;">
            <button id="showDetailsBtn" style="width: auto; background: #1e3c72; padding: 12px 30px;">🔍 عرض تفاصيل المعامل</button>
        </div>
    </div>

    <div class="two-columns">
        <div class="form-section">
            <div class="form-title">📝 شكوى جديدة</div>
            <form id="complaintForm">
                <div class="form-group">
                    <label>🏷️ نوع المكان *</label>
                    <select id="complaintType" required>
                        <option value="classroom">فصل دراسي</option>
                        <option value="lab">معمل كمبيوتر</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🔢 رقم المكان *</label>
                    <input type="text" id="roomNumber" placeholder="مثال: Lab-4" required>
                </div>
                <div class="form-group">
                    <label>📌 العنوان *</label>
                    <input type="text" id="shortTitle" placeholder="مثال: عطل مفاجئ" required>
                </div>
                <div class="form-group">
                    <label>📝 الوصف *</label>
                    <textarea id="description" placeholder="اشرح المشكلة..." required></textarea>
                </div>
                <button type="submit">➕ إرسال يدوياً</button>
            </form>
        </div>

        <div class="complaints-section">
            <div class="list-title">📋 السجل (بما في ذلك البلاغات التلقائية)</div>
            <div id="complaintsContainer" class="complaints-list">
                <div style="text-align:center; padding:20px; color:#7f8c8d;">لا توجد شكاوى حالياً.</div>
            </div>
            <button id="clearAllBtn" style="background: #e67e22; width: auto; margin-top:15px;">🗑️ مسح السجل</button>
        </div>
    </div>
</div>

<div id="detailsPage">
    <div class="container">
        <button onclick="document.getElementById('detailsPage').style.display='none'" style="width:auto; background:#e74c3c; margin-bottom: 20px;">⬅ عودة</button>
        <h2 style="text-align:center; margin-bottom:30px;">توزيع المختبرات</h2>
        <div class="labs-grid">
            <div class="lab-card"><h3>💻 معمل كمبيوتر 1</h3><button onclick="alert('25 جهاز PC')">الأدوات</button></div>
            <div class="lab-card"><h3>💻 معمل كمبيوتر 2</h3><button onclick="alert('20 جهاز Laptop')">الأدوات</button></div>
            <div class="lab-card"><h3>🔬 معمل الفيزياء</h3><button onclick="alert('أدوات تجارب الضوء')">الأدوات</button></div>
            <div class="lab-card"><h3>⚡ معمل الكهرباء</h3><button onclick="alert('لوحات تجارب وأفوميتر')">الأدوات</button></div>
        </div>
    </div>
</div>

<div id="toastMsg" class="toast-message"></div>

<script>
    // --- 1. إدارة البيانات ---
    function getComplaints() { return JSON.parse(localStorage.getItem("smartComplaints") || "[]"); }
    function saveComplaints(data) { localStorage.setItem("smartComplaints", JSON.stringify(data)); }

    function render() {
        const container = document.getElementById("complaintsContainer");
        const list = getComplaints();
        if(list.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:#7f8c8d;">السجل فارغ.</div>';
            return;
        }
        container.innerHTML = list.map((c, i) => `
            <div class="complaint-card">
                ${c.isAuto ? '<span class="auto-tag">تلقائي ⚡</span>' : ''}
                <div style="font-weight:bold;">📍 ${c.roomNumber}: ${c.title}</div>
                <p style="font-size:0.85rem; color:#555; margin:5px 0;">${c.description}</p>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                    <small style="color:#999;">${c.date}</small>
                    <button class="delete-btn" onclick="deleteItem(${i})">حذف</button>
                </div>
            </div>
        `).join('');
    }

    function addEntry(data, isAuto = false) {
        const list = getComplaints();
        list.unshift({ ...data, isAuto, date: new Date().toLocaleString('ar-EG') });
        saveComplaints(list);
        render();
        showToast(isAuto ? "⚡ تم رصد انقطاع الشحن وبلاغ تلقائي" : "✅ تم الإرسال");
    }

    function deleteItem(i) {
        const list = getComplaints();
        list.splice(i, 1);
        saveComplaints(list);
        render();
    }

    function showToast(msg) {
        const t = document.getElementById("toastMsg");
        t.textContent = msg; t.style.opacity = "1";
        setTimeout(() => t.style.opacity = "0", 3000);
    }

    // --- 2. نظام التتبع التلقائي للشاحن (Battery Monitor) ---
    if ('getBattery' in navigator) {
        navigator.getBattery().then(battery => {
            battery.addEventListener('chargingchange', () => {
                if (!battery.charging) {
                    // إذا فُصل الشاحن، أرسل شكوى تلقائية
                    addEntry({
                        type: 'lab',
                        roomNumber: 'النظام الآلي',
                        title: 'انقطاع تيار كهربائي (شحن)',
                        description: 'تم رصد فصل الشاحن عن الجهاز، قد يكون هناك مشكلة في مقبس الكهرباء.'
                    }, true);
                }
            });
        });
    }

    // --- 3. الأحداث (Events) ---
    document.getElementById("complaintForm").addEventListener("submit", (e) => {
        e.preventDefault();
        addEntry({
            type: document.getElementById("complaintType").value,
            roomNumber: document.getElementById("roomNumber").value,
            title: document.getElementById("shortTitle").value,
            description: document.getElementById("description").value
        });
        e.target.reset();
    });

    document.getElementById("showDetailsBtn").addEventListener("click", () => {
        document.getElementById("detailsPage").style.display = "block";
    });

    document.getElementById("clearAllBtn").addEventListener("click", () => {
        if(confirm("مسح السجل بالكامل؟")) { saveComplaints([]); render(); }
    });

    render();
</script>
</body>
</html>
